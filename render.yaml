services:
  - type: web
    name: perpustakaan-laravel
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # --- App ---
      - key: APP_NAME
        value: "Perpustakaan Daerah"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      # --- Supabase PostgreSQL ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # --- Supabase S3 Storage ---
      - key: FILESYSTEM_DISK
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: ap-southeast-1
      - key: AWS_BUCKET
        value: storage
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: "true"
      - key: AWS_ENDPOINT
        sync: false
      - key: AWS_URL
        sync: false
      # --- Laravel Services ---
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
